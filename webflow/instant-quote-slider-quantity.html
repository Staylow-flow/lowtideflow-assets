<!-- Paste into Embed — center column of iq-slider-row (Final Quantity) -->
<div class="iq-slider-control">
  <div class="iq-slider-ticks" aria-hidden="true">
    <span class="iq-slider-tick"></span>
    <span class="iq-slider-tick"></span>
    <span class="iq-slider-tick"></span>
    <span class="iq-slider-tick"></span>
    <span class="iq-slider-tick"></span>

    <span class="iq-slider-tick"></span>
    <span class="iq-slider-tick"></span>
    <span class="iq-slider-tick"></span>
    <span class="iq-slider-tick"></span>
  </div>

    type="range"
    class="iq-range"
    id="iq-slider-final-quantity"
    name="final-quantity"

    aria-valuemin="50"

    data-iq-value-target="iq-val-final-quantity"
