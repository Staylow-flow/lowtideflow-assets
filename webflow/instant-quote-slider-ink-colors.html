<!-- Paste into Embed — center column of iq-slider-row (Ink Colors) -->
<div class="iq-slider-control">
  <div class="iq-slider-ticks" aria-hidden="true">
    <span class="iq-slider-tick"></span>
    <span class="iq-slider-tick"></span>
    <span class="iq-slider-tick"></span>
    <span class="iq-slider-tick"></span>
  </div>
  <input
    type="range"
    class="iq-range"
    id="iq-slider-ink-colors"
    name="ink-colors"
    min="1"
    max="4"
    step="1"
    value="4"
    aria-label="Ink Colors"
    aria-valuemin="1"
    aria-valuemax="4"
    aria-valuenow="4"
    data-iq-value-target="iq-val-ink-colors"
  />
</div>
