<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lowtideflow — Flow Background Preview</title>
  <link rel="stylesheet" href="../css/flow-background.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; color: #f5f5f7; background: #07070d; }

    .ltf-flow-hero {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero-inner {
      max-width: 720px;
      text-align: center;
    }

    .hero-logo {
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
    }

    .hero-tag {
      font-size: clamp(1rem, 3vw, 1.35rem);
      opacity: 0.85;
      line-height: 1.5;
      max-width: 540px;
      margin: 0 auto 2rem;
    }

    .hero-cta {
      display: inline-block;
      padding: 0.85rem 1.75rem;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      color: inherit;
      text-decoration: none;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <section class="ltf-flow-hero">
    <div class="ltf-flow-bg" data-ltf-flow-bg aria-hidden="true"></div>

    <div class="hero-inner">
      <h1 class="hero-logo">Lowtideflow</h1>
      <p class="hero-tag">Custom apparel for crews that work hard. Move your mouse — colors flow, shift, and respond.</p>
      <a class="hero-cta" href="#">Start Your Gear</a>
    </div>
  </section>

  <script src="../js/flow-background.js"></script>
</body>
</html>
